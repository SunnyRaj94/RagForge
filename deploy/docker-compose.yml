version: "3.8"

services:
  # 1. PostgreSQL (For Temporal Backend)
  postgresql:
    image: postgres:14
    container_name: postgresql
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    networks:
      - ragforge-net

  # 2. Temporal Server
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal-server
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    depends_on:
      - postgresql
    networks:
      - ragforge-net

  # 3. Temporal Web UI
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - ragforge-net

  # 4. Qdrant Vector DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../data/qdrant:/qdrant/storage
    networks:
      - ragforge-net

  # 5. OpenProject
  openproject:
    image: openproject/openproject:14
    container_name: openproject-app
    ports:
      - "8080:80"
    environment:
      - OPENPROJECT_SECRET_KEY_BASE=supersecretkeybaseforlocaldev123456
      - OPENPROJECT_HTTPS=false
      - OPENPROJECT_HOST__NAME=localhost:8080
    volumes:
      - ../data/openproject:/var/openproject/assets
    networks:
      - ragforge-net

  # 6. Arize Phoenix (OTEL Tracing UI)
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: arize-phoenix
    ports:
      - "6006:6006" # Web Dashboard & OTLP Collector Endpoint
    networks:
      - ragforge-net

networks:
  ragforge-net:
    driver: bridge
